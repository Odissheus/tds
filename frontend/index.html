<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDS — Tech Deep Search | React SRL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'g-blue': '#4285F4',
                        'g-green': '#34A853',
                        'g-yellow': '#FBBC05',
                        'g-red': '#EA4335',
                        'surface': '#0f1117',
                        'surface-2': '#161822',
                        'surface-3': '#1e2030',
                        'surface-4': '#272a3a',
                        'border-subtle': '#2a2d3e',
                    },
                    fontFamily: { 'sans': ['Inter', 'sans-serif'] },
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0f1117; color: #e2e4ed; }

        /* Glassmorphism */
        .glass { background: rgba(30, 32, 48, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.06); }
        .glass-strong { background: rgba(30, 32, 48, 0.85); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.08); }

        /* Tab transitions */
        .tab-content { animation: fadeSlide 0.3s ease-out; }
        @keyframes fadeSlide { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* Sidebar hover */
        .nav-item { transition: all 0.2s ease; }
        .nav-item:hover { background: rgba(66, 133, 244, 0.1); }
        .nav-item.active { background: rgba(66, 133, 244, 0.15); border-right: 3px solid #4285F4; }

        /* Table rows */
        .tbl-row { transition: background 0.15s ease; }
        .tbl-row:hover { background: rgba(66, 133, 244, 0.05) !important; }

        /* Typing animation */
        .typing span { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #4285F4; animation: bounce 1.4s infinite; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-6px); opacity: 1; } }

        /* Glow card */
        .glow-blue { box-shadow: 0 0 20px rgba(66,133,244,0.12); }
        .glow-green { box-shadow: 0 0 20px rgba(52,168,83,0.12); }
        .glow-red { box-shadow: 0 0 20px rgba(234,67,53,0.12); }
        .glow-yellow { box-shadow: 0 0 20px rgba(251,188,5,0.12); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #2a2d3e; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #4285F4; }

        /* Pulse dot */
        .pulse-dot { animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body class="dark">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;
const { BarChart, Bar, XAxis, YAxis, Tooltip, Legend, ResponsiveContainer, LineChart, Line, PieChart, Pie, Cell, AreaChart, Area } = Recharts;

/* ====== API ====== */
const api = {
    get: async (u) => { const r = await fetch(u); if (!r.ok) throw new Error(r.status); return r.json(); },
    post: async (u, d) => { const r = await fetch(u, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(d) }); if (!r.ok) throw new Error(r.status); return r.json(); },
    patch: async (u, d) => { const r = await fetch(u, { method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify(d) }); if (!r.ok) throw new Error(r.status); return r.json(); },
};

/* ====== Badges ====== */
function Badge({children, color='blue', size='sm'}) {
    const c = {
        blue:'bg-g-blue/15 text-g-blue ring-g-blue/20', green:'bg-g-green/15 text-g-green ring-g-green/20',
        yellow:'bg-g-yellow/15 text-g-yellow ring-g-yellow/20', red:'bg-g-red/15 text-g-red ring-g-red/20',
        gray:'bg-gray-700/50 text-gray-400 ring-gray-600/20', orange:'bg-orange-500/15 text-orange-400 ring-orange-500/20',
        purple:'bg-purple-500/15 text-purple-400 ring-purple-500/20',
    };
    const s = size === 'xs' ? 'px-1.5 py-0 text-[10px]' : 'px-2 py-0.5 text-[11px]';
    return <span className={`inline-flex items-center rounded-full font-medium ring-1 ring-inset ${s} ${c[color]||c.blue}`}>{children}</span>;
}
function CatBadge({cat}) { const m={smartphone:'blue',earable:'green',wearable:'yellow',accessory:'gray',bundle:'orange'}; return <Badge color={m[cat]||'gray'}>{cat}</Badge>; }
function TierBadge({t}) { return <Badge color={t===1?'blue':'gray'}>T{t}</Badge>; }
function StatusBadge({s}) { const m={active:'green',eol:'yellow',disabled:'red'}; return <Badge color={m[s]||'gray'}>{s}</Badge>; }
function PromoTagBadge({tag}) { if(!tag) return null; const m={'Offerta Lampo':'red','Coupon':'green','Black Friday':'purple','Prime Deal':'blue','Spring Deal':'green','Sconto Amazon':'orange','Offerta del giorno':'yellow'}; return <Badge color={m[tag]||'purple'} size="xs">{tag}</Badge>; }

/* ====== MultiSelect ====== */
function MultiSelect({label, options, selected, onChange}) {
    const [open, setOpen] = useState(false);
    const ref = useRef(null);
    useEffect(() => { const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }; document.addEventListener('mousedown', h); return () => document.removeEventListener('mousedown', h); }, []);
    return (
        <div className="relative" ref={ref}>
            <button onClick={() => setOpen(!open)} className="glass rounded-lg px-3 py-1.5 text-xs flex items-center gap-1.5 hover:border-g-blue/40 transition-all">
                {label} {selected.length > 0 && <span className="bg-g-blue/20 text-g-blue rounded-full px-1.5 text-[10px] font-bold">{selected.length}</span>}
                <svg className={`w-3 h-3 transition-transform ${open?'rotate-180':''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7"/></svg>
            </button>
            {open && <div className="absolute top-full mt-1 glass-strong rounded-lg shadow-2xl z-30 min-w-[170px] py-1">
                {options.map(o => <label key={o} className="flex items-center gap-2 px-3 py-1.5 text-xs hover:bg-white/5 cursor-pointer"><input type="checkbox" checked={selected.includes(o)} onChange={() => onChange(selected.includes(o)?selected.filter(s=>s!==o):[...selected,o])} className="rounded border-gray-600 bg-transparent text-g-blue focus:ring-g-blue/30" />{o}</label>)}
                {selected.length>0 && <button onClick={()=>onChange([])} className="w-full text-[10px] text-g-red px-3 py-1 hover:bg-white/5 border-t border-border-subtle mt-1">Pulisci filtri</button>}
            </div>}
        </div>
    );
}

/* ====== Stat Card (Glassmorphism) ====== */
function StatCard({icon, value, label, color='blue', sub}) {
    const glows = {blue:'glow-blue', green:'glow-green', red:'glow-red', yellow:'glow-yellow'};
    const bgs = {blue:'from-g-blue/10', green:'from-g-green/10', red:'from-g-red/10', yellow:'from-g-yellow/10'};
    const texts = {blue:'text-g-blue', green:'text-g-green', red:'text-g-red', yellow:'text-g-yellow'};
    return (
        <div className={`glass rounded-xl p-5 ${glows[color]} bg-gradient-to-br ${bgs[color]} to-transparent`}>
            <div className="flex items-start justify-between">
                <div>
                    <p className="text-xs text-gray-500 uppercase tracking-wider font-medium">{label}</p>
                    <p className={`text-3xl font-bold mt-1 ${texts[color]}`}>{value}</p>
                    {sub && <p className="text-[11px] text-gray-500 mt-1">{sub}</p>}
                </div>
                <span className="text-2xl opacity-60">{icon}</span>
            </div>
        </div>
    );
}

/* ====== SIDEBAR ====== */
function Sidebar({active, setActive}) {
    const [time, setTime] = useState(new Date());
    useEffect(() => { const t = setInterval(()=>setTime(new Date()), 1000); return ()=>clearInterval(t); }, []);
    const items = [
        {id:'promozioni', icon:'📊', label:'Promozioni Live'},
        {id:'catalogo', icon:'📱', label:'Catalogo'},
        {id:'chat', icon:'💬', label:'Chat Analyst'},
        {id:'report', icon:'📄', label:'Report & Storico'},
        {id:'sistema', icon:'⚙️', label:'Sistema'},
    ];
    return (
        <aside className="fixed left-0 top-0 bottom-0 w-64 glass-strong z-40 flex flex-col border-r border-border-subtle">
            {/* Logo */}
            <div className="p-5 border-b border-border-subtle">
                <div className="flex items-center gap-3">
                    <img src="/static/logo.jpg" alt="TDS" className="w-10 h-10 rounded-lg object-contain bg-white/5 p-0.5" />
                    <div>
                        <h1 className="text-base font-bold leading-tight"><span className="text-g-blue">TDS</span> <span className="text-gray-300 font-normal">Tech Deep Search</span></h1>
                        <p className="text-[10px] text-gray-500">© React SRL</p>
                    </div>
                </div>
            </div>

            {/* Time */}
            <div className="px-5 py-3 border-b border-border-subtle">
                <p className="text-[10px] text-gray-500 uppercase tracking-widest">Data e ora</p>
                <p className="text-xs text-gray-300 mt-0.5">{time.toLocaleDateString('it-IT',{weekday:'short',day:'numeric',month:'short',year:'numeric'})}</p>
                <p className="text-lg font-mono text-g-blue font-semibold">{time.toLocaleTimeString('it-IT')}</p>
            </div>

            {/* Nav */}
            <nav className="flex-1 py-3">
                {items.map(i => (
                    <button key={i.id} onClick={()=>setActive(i.id)}
                        className={`nav-item w-full flex items-center gap-3 px-5 py-3 text-sm text-left ${active===i.id ? 'active text-g-blue font-medium' : 'text-gray-400 hover:text-gray-200'}`}>
                        <span className="text-lg">{i.icon}</span>{i.label}
                    </button>
                ))}
            </nav>

            {/* Status */}
            <div className="p-5 border-t border-border-subtle">
                <div className="flex items-center gap-2">
                    <span className="w-2 h-2 rounded-full bg-g-green pulse-dot"></span>
                    <span className="text-[11px] text-gray-400">Sistema attivo</span>
                </div>
                <p className="text-[10px] text-gray-600 mt-1">TDS v1.0 — React SRL</p>
            </div>
        </aside>
    );
}

/* ====== TAB 1: PROMOZIONI LIVE ====== */
function PromozioniTab() {
    const [promos, setPromos] = useState([]);
    const [loading, setLoading] = useState(true);
    const [f, setF] = useState({brands:[],categories:[],retailers:[],tier:null,googleOnly:false,week:''});
    const brands = ['Google','Samsung','Apple','Honor','OPPO','Xiaomi','Redmi','POCO','Motorola'];
    const cats = ['smartphone','earable','wearable','accessory','bundle'];
    const rets = ['euronics','unieuro','mediaworld','amazon'];

    useEffect(() => { load(); }, [f.week]);
    const load = async () => {
        setLoading(true);
        try { let u='/api/promotions'; if(f.week) u+='?week='+f.week; setPromos(await api.get(u)); } catch(e) { console.error(e); }
        setLoading(false);
    };
    const filtered = promos.filter(p => {
        if(f.brands.length && !f.brands.includes(p.brand)) return false;
        if(f.categories.length && !f.categories.includes(p.category)) return false;
        if(f.retailers.length && !f.retailers.includes(p.retailer)) return false;
        if(f.tier!==null && p.tier!==f.tier) return false;
        if(f.googleOnly && !p.is_google) return false;
        return true;
    });

    const googlePromos = filtered.filter(p=>p.is_google);
    const bestGoogleDiscount = googlePromos.length ? Math.max(...googlePromos.map(p=>p.sconto_percentuale)) : 0;
    const competitorAlerts = filtered.filter(p=>!p.is_google && p.sconto_percentuale>=15).length;

    // Chart data
    const chartData = useMemo(() => {
        const byRetailer = {};
        filtered.forEach(p => {
            if(!byRetailer[p.retailer]) byRetailer[p.retailer] = {name: p.retailer, google:0, competitor:0, count:0};
            if(p.is_google) byRetailer[p.retailer].google++;
            else byRetailer[p.retailer].competitor++;
            byRetailer[p.retailer].count++;
        });
        return Object.values(byRetailer);
    }, [filtered]);

    return (
        <div className="tab-content space-y-5">
            {/* Summary cards */}
            <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                <StatCard icon="📊" value={filtered.length} label="Promozioni settimana" color="blue" sub={`${googlePromos.length} Google, ${filtered.length-googlePromos.length} competitor`} />
                <StatCard icon="🏷️" value={bestGoogleDiscount?`-${bestGoogleDiscount.toFixed(0)}%`:'—'} label="Miglior sconto Google" color="green" />
                <StatCard icon="🔥" value={competitorAlerts} label="Alert competitor (>15%)" color="red" sub="Sconti aggressivi vs fascia Pixel" />
                <StatCard icon="🏪" value={new Set(filtered.map(p=>p.retailer)).size} label="Retailer con offerte" color="yellow" sub="Euronics, Unieuro, MediaWorld, Amazon" />
            </div>

            {/* Filters */}
            <div className="flex flex-wrap items-center gap-2">
                <MultiSelect label="Brand" options={brands} selected={f.brands} onChange={v=>setF({...f,brands:v})} />
                <MultiSelect label="Categoria" options={cats} selected={f.categories} onChange={v=>setF({...f,categories:v})} />
                <MultiSelect label="Retailer" options={rets} selected={f.retailers} onChange={v=>setF({...f,retailers:v})} />
                <button onClick={()=>setF({...f,tier:f.tier===1?null:1})} className={`glass rounded-lg px-3 py-1.5 text-xs transition-all ${f.tier===1?'!bg-g-blue/15 text-g-blue ring-1 ring-g-blue/30':'text-gray-400'}`}>Tier 1</button>
                <button onClick={()=>setF({...f,googleOnly:!f.googleOnly})} className={`glass rounded-lg px-3 py-1.5 text-xs transition-all ${f.googleOnly?'!bg-g-green/15 text-g-green ring-1 ring-g-green/30':'text-gray-400'}`}>Solo Google</button>
                <input type="text" placeholder="2026-W11" value={f.week} onChange={e=>setF({...f,week:e.target.value})} className="glass rounded-lg px-3 py-1.5 text-xs w-32 focus:ring-1 focus:ring-g-blue/40 outline-none bg-transparent" />
                <button onClick={load} className="bg-g-blue/90 hover:bg-g-blue text-white px-4 py-1.5 rounded-lg text-xs font-medium transition-all hover:shadow-lg hover:shadow-g-blue/20">Aggiorna</button>
            </div>

            {/* Chart */}
            {chartData.length > 0 && (
                <div className="glass rounded-xl p-5">
                    <h3 className="text-sm font-semibold text-gray-300 mb-3">Promozioni per Retailer</h3>
                    <ResponsiveContainer width="100%" height={200}>
                        <BarChart data={chartData} barGap={4}>
                            <XAxis dataKey="name" tick={{fill:'#6b7280',fontSize:11}} axisLine={false} tickLine={false} />
                            <YAxis tick={{fill:'#6b7280',fontSize:11}} axisLine={false} tickLine={false} />
                            <Tooltip contentStyle={{background:'#1e2030',border:'1px solid #2a2d3e',borderRadius:'8px',fontSize:'12px',color:'#e2e4ed'}} />
                            <Bar dataKey="google" name="Google" fill="#4285F4" radius={[4,4,0,0]} />
                            <Bar dataKey="competitor" name="Competitor" fill="#EA4335" radius={[4,4,0,0]} />
                        </BarChart>
                    </ResponsiveContainer>
                </div>
            )}

            {/* Table */}
            {loading ? <div className="text-center py-16 text-gray-500">Caricamento promozioni...</div> : (
                <div className="glass rounded-xl overflow-hidden">
                    <div className="overflow-x-auto">
                        <table className="w-full text-xs">
                            <thead><tr className="bg-surface-3/80 border-b border-border-subtle">
                                <th className="text-left px-4 py-3 font-semibold text-gray-400 uppercase text-[10px] tracking-wider">Brand</th>
                                <th className="text-left px-4 py-3 font-semibold text-gray-400 uppercase text-[10px] tracking-wider">Modello</th>
                                <th className="text-left px-4 py-3 font-semibold text-gray-400 uppercase text-[10px] tracking-wider">Cat.</th>
                                <th className="text-left px-4 py-3 font-semibold text-gray-400 uppercase text-[10px] tracking-wider">Retailer</th>
                                <th className="text-right px-4 py-3 font-semibold text-gray-400 uppercase text-[10px] tracking-wider">Originale</th>
                                <th className="text-right px-4 py-3 font-semibold text-gray-400 uppercase text-[10px] tracking-wider">Promo</th>
                                <th className="text-right px-4 py-3 font-semibold text-gray-400 uppercase text-[10px] tracking-wider">Sconto</th>
                                <th className="text-left px-4 py-3 font-semibold text-gray-400 uppercase text-[10px] tracking-wider">Tag</th>
                                <th className="text-left px-4 py-3 font-semibold text-gray-400 uppercase text-[10px] tracking-wider">Validità</th>
                                <th className="text-center px-4 py-3 font-semibold text-gray-400 uppercase text-[10px] tracking-wider">Link</th>
                            </tr></thead>
                            <tbody>
                                {filtered.length===0 ? <tr><td colSpan={10} className="text-center py-12 text-gray-500">Nessuna promozione trovata</td></tr> :
                                filtered.map((p,i) => (
                                    <tr key={p.id||i} className={`tbl-row border-b border-border-subtle/50 ${i%2===0?'bg-transparent':'bg-white/[0.01]'}`}>
                                        <td className="px-4 py-2.5 font-medium text-gray-200">{p.brand}</td>
                                        <td className="px-4 py-2.5 text-gray-300">{p.model}</td>
                                        <td className="px-4 py-2.5"><CatBadge cat={p.category}/></td>
                                        <td className="px-4 py-2.5 capitalize text-gray-300">{p.retailer}{p.retailer_variant?` (${p.retailer_variant})`:''}</td>
                                        <td className="px-4 py-2.5 text-right text-gray-500 line-through">€{p.prezzo_originale?.toFixed(2)}</td>
                                        <td className="px-4 py-2.5 text-right font-bold text-white">€{p.prezzo_promo?.toFixed(2)}</td>
                                        <td className="px-4 py-2.5 text-right">
                                            {p.sconto_percentuale>=20 ? <Badge color="green">-{p.sconto_percentuale?.toFixed(1)}%</Badge> :
                                             !p.is_google && p.sconto_percentuale>=15 ? <Badge color="orange">🔥 -{p.sconto_percentuale?.toFixed(1)}%</Badge> :
                                             <span className="text-gray-500">-{p.sconto_percentuale?.toFixed(1)}%</span>}
                                        </td>
                                        <td className="px-4 py-2.5"><PromoTagBadge tag={p.promo_tag}/></td>
                                        <td className="px-4 py-2.5 text-gray-500">{p.data_inizio}{p.data_fine?` — ${p.data_fine}`:''}</td>
                                        <td className="px-4 py-2.5 text-center">{p.url_fonte && <a href={p.url_fonte} target="_blank" rel="noopener" className="text-g-blue hover:text-blue-300 transition-colors">🔗</a>}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                    <div className="px-4 py-2.5 border-t border-border-subtle text-[11px] text-gray-500">{filtered.length} promozioni</div>
                </div>
            )}
        </div>
    );
}

/* ====== TAB 2: CATALOGO ====== */
function CatalogoTab() {
    const [products, setProducts] = useState([]);
    const [loading, setLoading] = useState(true);
    const [f, setF] = useState({brands:[],categories:[],tier:null,status:null,googleOnly:false});
    const [showAdd, setShowAdd] = useState(false);
    const [showImport, setShowImport] = useState(false);
    const [editCell, setEditCell] = useState(null);
    const [editVal, setEditVal] = useState('');
    const brands = ['Google','Samsung','Apple','Honor','OPPO','Xiaomi','Redmi','POCO','Motorola'];

    useEffect(()=>{ load(); },[]);
    const load = async () => { setLoading(true); try { setProducts(await api.get('/api/products')); } catch(e){} setLoading(false); };
    const upd = async (id,field,val) => { try { await api.patch(`/api/products/${id}`,{[field]:val}); load(); } catch(e){} setEditCell(null); };
    const scrape = async id => { try { const r = await api.post(`/api/scrape/${id}`,{}); alert(r.message); } catch(e){ alert('Errore'); } };

    const filtered = products.filter(p => {
        if(f.brands.length && !f.brands.includes(p.brand)) return false;
        if(f.categories.length && !f.categories.includes(p.category)) return false;
        if(f.tier!==null && p.tier!==f.tier) return false;
        if(f.status && p.status!==f.status) return false;
        if(f.googleOnly && !p.is_google) return false;
        return true;
    });

    return (
        <div className="tab-content space-y-4">
            <div className="flex flex-wrap items-center gap-2">
                <MultiSelect label="Brand" options={brands} selected={f.brands} onChange={v=>setF({...f,brands:v})} />
                <MultiSelect label="Categoria" options={['smartphone','earable','wearable','accessory','bundle']} selected={f.categories} onChange={v=>setF({...f,categories:v})} />
                {[1,2].map(t=><button key={t} onClick={()=>setF({...f,tier:f.tier===t?null:t})} className={`glass rounded-lg px-3 py-1.5 text-xs ${f.tier===t?'!bg-g-blue/15 text-g-blue ring-1 ring-g-blue/30':'text-gray-400'}`}>Tier {t}</button>)}
                {['active','eol','disabled'].map(s=><button key={s} onClick={()=>setF({...f,status:f.status===s?null:s})} className={`glass rounded-lg px-3 py-1.5 text-xs capitalize ${f.status===s?'!bg-g-green/15 text-g-green ring-1 ring-g-green/30':'text-gray-400'}`}>{s}</button>)}
                <button onClick={()=>setF({...f,googleOnly:!f.googleOnly})} className={`glass rounded-lg px-3 py-1.5 text-xs ${f.googleOnly?'!bg-g-green/15 text-g-green ring-1 ring-g-green/30':'text-gray-400'}`}>Solo Google</button>
                <div className="ml-auto flex gap-2">
                    <button onClick={()=>setShowAdd(true)} className="bg-g-blue/90 hover:bg-g-blue text-white px-4 py-1.5 rounded-lg text-xs font-medium transition-all hover:shadow-lg hover:shadow-g-blue/20">+ Aggiungi Prodotto</button>

/* ====== TAB 3: CHAT ====== */
function ChatTab() {
    const [msgs, setMsgs] = useState([]);
    const [input, setInput] = useState('');
    const [streaming, setStreaming] = useState(false);
    const [pdfUrl, setPdfUrl] = useState(null);
    const endRef = useRef(null);
    useEffect(()=>{ endRef.current?.scrollIntoView({behavior:'smooth'}); },[msgs]);

    const send = async () => {
        if(!input.trim()||streaming) return;
        const txt = input.trim(); setInput(''); setPdfUrl(null);
        setMsgs(p=>[...p,{role:'user',content:txt}]);
        setStreaming(true);
        try {
            const res = await fetch('/api/chat/stream',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:txt,conversation_history:msgs.map(m=>({role:m.role,content:m.content}))})});
            const reader = res.body.getReader(); const dec = new TextDecoder(); let aText = '';
            while(true) {
                const {done, value} = await reader.read(); if(done) break;
                const chunk = dec.decode(value,{stream:true});
                for (const line of chunk.split('\n').filter(l=>l.startsWith('data: '))) {
                    try { const d = JSON.parse(line.slice(6));
                        if(d.type==='text') { aText+=d.content; setMsgs(p=>{const u=[...p]; const li=u.length-1; if(u[li]?.role==='assistant') u[li]={role:'assistant',content:aText}; else u.push({role:'assistant',content:aText}); return u;}); }
                        else if(d.type==='pdf_ready') setPdfUrl(d.pdf_path);
                    } catch(e){}
                }
            }
        } catch(e) { setMsgs(p=>[...p,{role:'assistant',content:'Errore di connessione.'}]); }
        setStreaming(false);
    };

    return (
        <div className="tab-content flex flex-col h-[calc(100vh-80px)]">
            <div className="flex-1 overflow-y-auto px-4 py-4 space-y-3">
                {msgs.length===0 && <div className="text-center py-24"><p className="text-4xl mb-3 opacity-40">💬</p><p className="text-gray-400">Ciao Tania! Sono il tuo assistente BI.</p><p className="text-gray-600 text-sm mt-1">Chiedimi di analizzare promozioni, confrontare competitor, o generare report PDF.</p></div>}
                {msgs.map((m,i)=><div key={i} className={`flex ${m.role==='user'?'justify-end':'justify-start'}`}><div className={`max-w-[70%] rounded-2xl px-4 py-3 text-sm whitespace-pre-wrap ${m.role==='user'?'bg-g-blue text-white rounded-br-sm':'glass text-gray-200 rounded-bl-sm'}`}>{m.content}</div></div>)}
                {streaming && <div className="flex justify-start"><div className="typing glass rounded-2xl px-4 py-3"><span></span> <span></span> <span></span></div></div>}
                {pdfUrl && <div className="flex justify-start"><a href="/api/reports/download/latest" className="glass !bg-g-green/10 text-g-green rounded-xl px-4 py-2.5 text-sm hover:!bg-g-green/20 transition-all inline-flex items-center gap-2">📄 Scarica PDF</a></div>}
                <div ref={endRef}/>
            </div>
            <div className="border-t border-border-subtle p-4">
                <div className="flex gap-2 max-w-3xl mx-auto">
                    <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&send()} placeholder="Scrivi un messaggio..." disabled={streaming} className="flex-1 glass rounded-xl px-4 py-3 text-sm outline-none focus:ring-1 focus:ring-g-blue/40 bg-transparent" />
                    <button onClick={send} disabled={!input.trim()||streaming} className="bg-g-blue/90 hover:bg-g-blue disabled:bg-surface-4 disabled:text-gray-600 text-white px-6 py-3 rounded-xl text-sm font-medium transition-all">Invia</button>
                </div>
            </div>
        </div>
    );
}

/* ====== TAB 5: SISTEMA ====== */
function SistemaTab() {
    const [status, setStatus] = useState(null);
    const [logs, setLogs] = useState([]);
    const [loading, setLoading] = useState(true);
    useEffect(()=>{ load(); },[]);
    const load = async () => { setLoading(true); try { const [s,l]=await Promise.all([api.get('/api/system/status'),api.get('/api/system/logs?limit=30')]); setStatus(s); setLogs(l); } catch(e){} setLoading(false); };
    const fullScrape = async () => { if(!confirm('Avviare scraping completo?')) return; try { const r=await api.post('/api/scrape/full',{}); alert(r.message); } catch(e){alert(e)} };
    const markEol = async id => { try { await api.post(`/api/system/mark-eol/${id}`,{}); load(); } catch(e){alert(e)} };

    if(loading) return <div className="tab-content text-center py-16 text-gray-500">Caricamento...</div>;
    return (
        <div className="tab-content space-y-5">
            {status && <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                <StatCard icon="📦" value={status.total_products_monitored} label="Prodotti monitorati" color="blue" />
                <StatCard icon="🟢" value={status.google_products} label="Google Pixel" color="green" />
                <StatCard icon="🔴" value={status.competitor_products} label="Competitor" color="yellow" />
                <StatCard icon="🏪" value={status.retailers?.length||4} label="Retailer attivi" color="blue" sub="Euronics, Unieuro, MW, Amazon" />
            </div>}

            <div className="flex items-center gap-3">
                <button onClick={fullScrape} className="bg-g-blue/90 hover:bg-g-blue text-white px-5 py-2 rounded-lg text-sm font-medium transition-all hover:shadow-lg hover:shadow-g-blue/20">▶️ Scraping Manuale Completo</button>
                <button onClick={load} className="glass text-gray-300 hover:text-white px-4 py-2 rounded-lg text-sm transition-all">🔄 Aggiorna</button>
                {status?.last_scrape && <span className="text-xs text-gray-500">Ultimo: {new Date(status.last_scrape).toLocaleString('it-IT')}</span>}
            </div>

            {status?.alerts?.length > 0 && <div className="glass !border-g-red/20 rounded-xl p-4">

                {status.alerts.map(a=><div key={a.product_id} className="flex items-center justify-between bg-g-red/5 rounded-lg px-3 py-2 text-xs mt-1">
                    <span><strong>{a.brand} {a.model}</strong> — <Badge color="red">{a.not_found_streak} settimane</Badge></span>
                    <button onClick={()=>markEol(a.product_id)} className="text-g-yellow hover:text-yellow-300 font-medium transition-colors">Segna EOL</button>
                </div>)}
            </div>}

            <div className="glass rounded-xl overflow-hidden">
                <h3 className="text-sm font-semibold text-gray-300 px-4 pt-4 pb-2">📋 Log Scraping</h3>
                <div className="overflow-x-auto max-h-80 overflow-y-auto">
                    <table className="w-full text-xs">
                        <thead className="bg-surface-3/80 sticky top-0"><tr>
                            {['Prodotto','Retailer','Status','Errore','Data'].map(h=><th key={h} className="text-left px-4 py-2 font-semibold text-gray-400 uppercase text-[10px] tracking-wider">{h}</th>)}
                        </tr></thead>
                        <tbody>{logs.map((l,i)=><tr key={l.id} className={`border-t border-border-subtle/50 ${i%2?'bg-white/[0.01]':''}`}>
                            <td className="px-4 py-1.5 text-gray-300">{l.product}</td>
                            <td className="px-4 py-1.5 capitalize text-gray-400">{l.retailer}</td>
                            <td className="px-4 py-1.5">{l.status==='found'?<Badge color="green">found</Badge>:l.status==='error'?<Badge color="red">error</Badge>:<Badge color="gray">not found</Badge>}</td>
                            <td className="px-4 py-1.5 text-gray-600 truncate max-w-[200px]">{l.error_message||'—'}</td>
                            <td className="px-4 py-1.5 text-gray-500">{new Date(l.scraped_at).toLocaleString('it-IT')}</td>
                        </tr>)}</tbody>
                    </table>
                </div>
            </div>
        </div>
    );
}
